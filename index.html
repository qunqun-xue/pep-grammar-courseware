<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEP 语法大冒险 - 小学高年级英语自学</title>
  <link rel="stylesheet" href="./styles.css?v=20260527k">
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <p class="brand-kicker">Grammar Adventure</p>
        <h1>PEP 英语语法自学冒险</h1>
      </div>
      <div class="topbar-actions">
        <p id="progress-text" class="progress-text">L01 / L20</p>
        <button id="copy-link-btn" class="ghost-btn" type="button">复制当前链接</button>
      </div>
    </header>

    <nav class="main-tabs" aria-label="主菜单">
      <button id="tab-learn" class="main-tab active" type="button">语法讲解</button>
      <button id="tab-test" class="main-tab" type="button">语法测试</button>
    </nav>

    <section id="learn-view" class="view-panel">
      <div class="content-grid">
        <aside class="lesson-nav">
          <p class="nav-title">课程目录</p>
          <ul id="lesson-list" class="lesson-list"></ul>
        </aside>

        <main class="lesson-main">
          <article class="lesson-paper">
            <header class="lesson-header">
              <h2 id="lesson-title"></h2>
            </header>
            <div id="lesson-content" class="lesson-content"></div>
          </article>

          <nav class="pager" aria-label="课程翻页">
            <button id="prev-btn" class="page-btn" type="button">上一课</button>
            <button id="next-btn" class="page-btn" type="button">下一课</button>
          </nav>
        </main>
      </div>
    </section>

    <section id="test-view" class="view-panel hidden">
      <article class="test-shell">
        <header class="test-header">
          <h2>语法测试中心</h2>
          <p>每次随机生成 20 题，全部完成后一键提交批改，错题会自动加入错题集。</p>
        </header>

        <nav class="sub-tabs" aria-label="测试菜单">
          <button id="subtab-exam" class="sub-tab active" type="button">开始测试</button>
          <button id="subtab-wrong" class="sub-tab" type="button">错题集</button>
        </nav>

        <section id="exam-panel" class="sub-panel">
          <p id="test-summary" class="test-summary">正在加载测试...</p>
          <div id="test-paper" class="test-paper"></div>
          <div id="test-submit-area" class="test-submit-area hidden">
            <button id="submit-test-btn" class="submit-btn" type="button">提交整卷批改</button>
          </div>
        </section>

        <section id="wrongbook-panel" class="sub-panel hidden">
          <div class="test-actions">
            <button id="clear-wrongbook-btn" class="mini-btn light" type="button">清空错题集</button>
          </div>
          <div id="wrongbook-list" class="wrongbook-list"></div>
        </section>
      </article>
    </section>
  </div>

  <script src="./lessons-data.js?v=20260527k"></script>
  <script src="./quiz-bank.js?v=20260527k"></script>
  <script src="./app.js?v=20260527k"></script>
</body>
</html>
